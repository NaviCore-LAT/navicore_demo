<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#08111F;--navy2:#0F1E30;--navy3:#172840;
  --cyan:#00C2CC;--cyan2:#00E5F0;
  --cdim:rgba(0,194,204,0.12);--cdim2:rgba(0,194,204,0.06);
  --slate:#3A6B8A;--slate2:#4D85A8;
  --white:#F0F5FA;--white2:#D8E4EF;--muted:#6B8299;--muted2:#4A6070;
  --danger:#E05555;--ddim:rgba(224,85,85,0.12);
  --success:#2EC97E;--sdim:rgba(46,201,126,0.12);
  --warn:#E08A30;--wdim:rgba(224,138,48,0.12);
  --purple:#7C5CBF;
  --b1:rgba(0,194,204,0.1);--b2:rgba(107,130,153,0.15);
}
html,body{height:100%;background:#08111F;font-family:'DM Sans',sans-serif;color:#F0F5FA;overflow:hidden}
#app{display:flex;height:100vh;position:relative;background:#08111F}
#sb{width:214px;background:var(--navy2);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:9px;padding:14px 16px 12px;border-bottom:1px solid var(--b1)}
.sb-logo{width:28px;height:28px;background:var(--cyan);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--navy);flex-shrink:0}
.sb-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}
.sb-section{padding:10px 16px 4px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted2)}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:11.5px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none;border-radius:0 6px 6px 0}
.nav-item:hover{color:var(--white2);background:rgba(0,194,204,0.04);padding-left:20px}
.nav-item.active{color:var(--cyan);border-left-color:var(--cyan);background:var(--cdim2);padding-left:20px}
.nav-badge{width:6px;height:6px;background:var(--danger);border-radius:50%;margin-left:auto;flex-shrink:0;animation:pulse 2s infinite}
.sb-user{margin-top:auto;padding:10px 14px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.user-av{width:30px;height:30px;border-radius:50%;background:var(--slate);border:1.5px solid rgba(0,194,204,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.user-name{font-size:11.5px;font-weight:500}.user-role{font-size:9px;color:var(--cyan);letter-spacing:1px;text-transform:uppercase}
.notif-bell{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;position:relative}
.notif-bell:hover{color:var(--white)}
.notif-dot{position:absolute;top:0;right:0;width:8px;height:8px;background:var(--danger);border-radius:50%;border:1.5px solid var(--navy2);display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:700}
.btn-logout{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px;transition:color .15s}
.btn-logout:hover{color:var(--danger)}
#main{flex:1;overflow-y:auto;padding:18px 20px 24px;background:var(--navy);min-height:0;scroll-behavior:smooth}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:rgba(0,194,204,0.2);border-radius:2px}
#login-screen{position:absolute;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:100}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,194,204,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,194,204,0.04) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.bg-glow{position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(0,194,204,0.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.login-card{background:var(--navy2);border:1px solid rgba(0,194,204,0.2);border-radius:18px;padding:2.5rem 2rem;width:390px;position:relative;z-index:1}
.brand-big{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:5px;display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo-big{width:40px;height:40px;background:var(--cyan);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--navy)}
.f-label{display:block;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.f-input{width:100%;background:var(--navy);border:1px solid rgba(107,130,153,0.2);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;transition:border-color .2s;margin-bottom:12px}
.f-input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,194,204,0.15)}
.btn-enter{width:100%;background:var(--cyan);color:var(--navy);border:none;border-radius:9px;padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:all .15s}
.btn-enter:hover{background:var(--cyan2)}.btn-enter:active{transform:scale(0.98)}.btn-enter:disabled{opacity:.6;cursor:not-allowed}
.demo-pills{margin-top:16px;padding-top:14px;border-top:1px solid rgba(107,130,153,0.12)}
.demo-pill-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.demo-pill{display:flex;align-items:center;gap:8px;width:100%;background:rgba(0,194,204,0.05);border:1px solid rgba(0,194,204,0.12);border-radius:7px;padding:7px 10px;color:var(--white2);font-size:11px;cursor:pointer;margin-bottom:5px;font-family:'DM Sans',sans-serif;text-align:left;transition:background .2s}
.demo-pill:hover{background:rgba(0,194,204,0.1)}.demo-pill:active{transform:scale(0.99)}
.role-chip{font-size:9px;background:rgba(0,194,204,0.15);color:var(--cyan);padding:2px 7px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;margin-left:auto;flex-shrink:0}
.err-msg{color:var(--danger);font-size:11.5px;margin-top:6px;display:none;padding:6px 10px;background:rgba(224,85,85,0.08);border-radius:6px;border-left:2px solid var(--danger)}
.card{background:var(--navy2);border:1px solid var(--b2);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card-title{font-size:11.5px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--white)}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.page-sub{font-size:10.5px;color:var(--muted);margin-top:1px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.kpi{background:var(--navy2);border:1px solid var(--b2);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;transition:transform .15s;cursor:default}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi:hover{transform:translateY(-2px)}
.kpi.c::before{background:var(--cyan)}.kpi.g::before{background:var(--success)}.kpi.w::before{background:var(--warn)}.kpi.r::before{background:var(--danger)}
.kpi-lbl{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1}
.kpi-delta{font-size:9.5px;margin-top:3px}
.up{color:var(--success)}.dn{color:var(--danger)}.nt{color:var(--muted)}
.bdg{padding:2px 7px;border-radius:4px;font-size:9.5px;font-weight:600;display:inline-block}
.b-ok{background:var(--sdim);color:var(--success)}.b-dl{background:var(--ddim);color:var(--danger)}
.b-tr{background:var(--cdim);color:var(--cyan)}.b-pd{background:var(--wdim);color:var(--warn)}
.b-sea{background:rgba(58,107,138,0.22);color:#7BBDE0}.b-land{background:var(--sdim);color:var(--success)}.b-air{background:var(--cdim);color:var(--cyan)}
.b-exec{background:rgba(201,168,76,0.15);color:#E8C97A}.b-ana{background:var(--cdim);color:var(--cyan)}.b-cli{background:rgba(58,107,138,0.2);color:#7BBDE0}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:6px 9px;color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--b2);font-weight:500}
.tbl td{padding:7px 9px;color:var(--white2);border-bottom:1px solid rgba(107,130,153,0.07)}
.tbl tr{transition:background .1s}.tbl tr:hover td{background:var(--cdim2)}.tbl tr:last-child td{border-bottom:none}
.alert-row{display:flex;gap:9px;padding:9px 10px;border-radius:8px;margin-bottom:6px;border-left:2px solid}
.a-crit{background:var(--ddim);border-color:var(--danger)}.a-warn{background:var(--wdim);border-color:var(--warn)}.a-ok{background:var(--sdim);border-color:var(--success)}.a-info{background:var(--cdim);border-color:var(--cyan)}
.a-t{font-size:11px;font-weight:600;color:var(--white)}.a-b{font-size:10px;color:var(--muted);margin-top:2px}.a-tm{font-size:9px;color:var(--muted2);margin-top:3px}
.track-card{background:var(--navy2);border:1px solid var(--b2);border-radius:10px;padding:14px 16px;margin-bottom:9px;transition:border-color .15s,transform .15s}
.track-card:hover{border-color:rgba(0,194,204,0.2);transform:translateX(2px)}
.mb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mb-lbl{font-size:10px;color:var(--muted);width:74px;flex-shrink:0}
.mb-track{flex:1;height:5px;background:rgba(107,130,153,0.1);border-radius:3px;overflow:hidden}
.mb-fill{height:100%;border-radius:3px}
.mb-val{font-size:10px;font-weight:500;width:36px;text-align:right}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.chart-full{grid-column:1/-1}
.mtabs{display:flex;gap:3px;background:var(--navy2);border-radius:8px;padding:3px}
.mtab{padding:4px 10px;font-size:10.5px;font-weight:500;border-radius:5px;cursor:pointer;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .12s;display:flex;align-items:center;gap:4px}
.mtab.active{background:var(--cyan);color:var(--navy)}.mtab:hover:not(.active){color:var(--white)}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.comp-card{background:var(--navy);border:1px solid var(--b2);border-radius:8px;padding:9px 11px}
.comp-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}
.ai-msgs{height:230px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 2px;margin-bottom:10px}
.ai-msg-user{align-self:flex-end;background:var(--cdim);border:1px solid rgba(0,194,204,0.2);color:var(--white);padding:8px 11px;border-radius:10px 10px 2px 10px;font-size:11.5px;max-width:80%;line-height:1.5}
.ai-msg-bot{align-self:flex-start;background:rgba(124,92,191,0.1);border:1px solid rgba(124,92,191,0.18);color:var(--white2);padding:8px 11px;border-radius:10px 10px 10px 2px;font-size:11.5px;max-width:85%;line-height:1.55}
.ai-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.ai-chip{background:rgba(124,92,191,0.1);border:1px solid rgba(124,92,191,0.2);border-radius:7px;padding:4px 9px;font-size:10px;color:#A89DD8;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.ai-chip:hover{background:rgba(124,92,191,0.2)}.ai-chip:active{transform:scale(0.97)}
.ai-input-bar{display:flex;gap:7px}
.ai-input{flex:1;background:var(--navy);border:1px solid var(--b2);border-radius:8px;padding:8px 11px;color:var(--white);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;resize:none}
.ai-input:focus{border-color:rgba(124,92,191,0.5)}
.ai-send{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;transition:background .15s}
.ai-send:hover{background:#9370DB}.ai-send:disabled{opacity:.4;cursor:not-allowed}
.notif-panel{position:absolute;top:0;right:0;bottom:0;width:264px;background:var(--navy2);border-left:1px solid var(--b1);z-index:20;display:none;flex-direction:column}
.notif-panel.open{display:flex;animation:slideIn .2s ease-out}
.notif-hdr{padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.notif-list-wrap{flex:1;overflow-y:auto;padding:8px}
.notif-item{padding:9px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer;border-left:2px solid transparent;transition:background .12s}
.notif-item.unread{background:var(--cdim2)}.notif-item:hover{background:rgba(0,194,204,0.04)}
.notif-t{font-weight:600;color:var(--white);font-size:11px;margin-bottom:2px}
.notif-b{font-size:10px;color:var(--muted);line-height:1.4}.notif-tm{font-size:9px;color:var(--muted2);margin-top:3px}
.admin-tabs{display:flex;gap:2px;background:var(--navy2);border-radius:8px;padding:3px;width:fit-content;margin-bottom:12px}
.adm-tab{padding:5px 14px;font-size:11px;font-weight:500;border-radius:6px;cursor:pointer;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .12s}
.adm-tab.active{background:var(--cyan);color:var(--navy)}.adm-tab:hover:not(.active){color:var(--white)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.form-field label{display:block;font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.form-field input,.form-field select{width:100%;background:var(--navy);border:1px solid var(--b2);border-radius:7px;padding:7px 9px;color:var(--white);font-size:11.5px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.form-field input:focus,.form-field select:focus{border-color:var(--cyan)}
.btn{padding:6px 13px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px;border:none;transition:all .15s}
.btn:active{transform:scale(0.97)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--cyan);color:var(--navy)}.btn-primary:hover{background:var(--cyan2)}
.btn-ghost{background:rgba(0,194,204,0.08);color:var(--cyan);border:1px solid rgba(0,194,204,0.2)}.btn-ghost:hover{background:rgba(0,194,204,0.15)}
.btn-sm{padding:3px 9px;font-size:10px}.btn-danger{background:var(--ddim);color:var(--danger)}
.exp-bar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--navy3);border-radius:8px;border:1px solid var(--b2);margin-bottom:10px}
.exp-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.exp-btn:hover{transform:translateY(-1px);filter:brightness(1.1)}.exp-btn:active{transform:translateY(0)}
.e-pdf{background:var(--ddim);color:#F08080}.e-xl{background:var(--sdim);color:var(--success)}.e-csv{background:rgba(107,130,153,0.15);color:var(--muted)}
.stat-row{display:flex;gap:9px;margin-bottom:10px}
.stat-item{flex:1;background:var(--navy3);border-radius:8px;padding:10px;text-align:center}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cyan)}.stat-l{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.scroll-wrap{max-height:250px;overflow-y:auto}
*{scrollbar-width:thin;scrollbar-color:rgba(0,194,204,0.2) transparent}
.doc-card{background:var(--navy2);border:1px solid rgba(107,130,153,0.15);border-radius:10px;padding:12px 14px;cursor:default;transition:border-color .15s}
.doc-card:hover{border-color:rgba(0,194,204,0.25)}
.empty-state{text-align:center;padding:36px;color:var(--muted)}
.empty-state i{font-size:32px;display:block;margin-bottom:10px;opacity:.3}
.empty-state p{font-size:12px}
.toast{position:fixed;bottom:14px;right:14px;background:var(--navy2);border:1px solid var(--cyan);border-radius:10px;padding:9px 14px;font-size:11.5px;color:var(--cyan);display:flex;align-items:center;gap:7px;z-index:9999;opacity:0;transform:translateY(20px);transition:all .25s;pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#main > *{animation:fadeIn .18s ease-out}
.ldots::after{content:'...';animation:ldot 1.2s steps(4,end) infinite}
@keyframes ldot{0%,20%{content:''}40%{content:'.'}60%{content:'..'}80%,100%{content:'...'}}
</style>
</head>

<noscript><div style="position:fixed;inset:0;background:#08111F;color:#F0F5FA;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:14px;text-align:center;z-index:9999"><div><div style="font-size:32px;margin-bottom:12px">⚠️</div>NAVICORE requiere JavaScript habilitado.<br><small style="color:#6B8299;margin-top:8px;display:block">Habilita JavaScript en tu navegador y recarga la pagina.</small></div></div></noscript>

  <div class="login-card">
    <div class="brand-big"><div class="logo-big">&#9875;</div>NAVICORE</div>
    <div style="font-size:9.5px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">Logistics Intelligence Platform</div>

// ── LOAD PROFILE ──────────────────────────────────────────────────────────
function loadProfile(key) {
  var p = DEMO_PROFILES[key] || DEMO_PROFILES.generic;

  Object.keys(USERS_REF).forEach(function(k) { delete USERS_REF[k]; });
  p.users.forEach(function(u) {
    USERS_REF[u.email] = { pass:u.pass, role:u.role, name:u.name, init:u.init };
  });

  SHIPS.length = 0;
  p.ships.forEach(function(s) { SHIPS.push(s); });

  ALERTS.length = 0;
  p.alerts.forEach(function(a) {
    ALERTS.push({ id:a.id, lv:a.lv, title:a.title, body:a.body, time:a.time, read:a.read });
  });

  COMPLIANCE_DATA.length = 0;
  p.compliance.forEach(function(c) { COMPLIANCE_DATA.push(c); });

  var dtypes = { sea:'BL', air:'AWB', land:'CMR' };
  DOCS.length = 0;
  p.ships.forEach(function(s, i) {
    DOCS.push({
      type:dtypes[s.mode]||'BL',
      name:(dtypes[s.mode]||'BL')+' - '+s.id,
      date:'Jun 2025', mode:s.mode,
      size:((i%4+1)*120)+' KB',
      shipId:s.id
    });
  });

  // Update pill labels
  var exU = p.users.find(function(u){return u.role==='executive';}) || p.users[0];
  var anU = p.users.find(function(u){return u.role==='analyst';})   || p.users[1]||p.users[0];
  var clU = p.users.find(function(u){return u.role==='client';})    || p.users[p.users.length-1];

  var spans = {
    exec:    document.querySelector('#dp-exec span'),
    analyst: document.querySelector('#dp-analyst span'),
    client:  document.querySelector('#dp-client span')
  };
  if (spans.exec)    spans.exec.textContent    = exU.email + ' — ' + p.meta.company;
  if (spans.analyst) spans.analyst.textContent = anU.email + ' — ' + p.meta.sector;
  if (spans.client)  spans.client.textContent  = clU.email + ' — Vista cliente';

  window._pu = { exec:exU, analyst:anU, client:clU };

  console.log('[NAVICORE] Profile loaded:', p.meta.company,
    '| Users:', Object.keys(USERS_REF).join(', '));
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  var m = document.getElementById('toast-msg');
  if (!t || !m) return;
  m.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function filteredShips() {
  return activeMode === 'all' ? SHIPS : SHIPS.filter(function(s) { return s.mode === activeMode; });
}
function unreadCount() {
  return ALERTS.filter(function(a) { return !a.read; }).length;
}
function updateNotifDot() {
  var c = unreadCount();
  var d = document.getElementById('notif-dot');
  if (!d) return;
  d.textContent    = c > 9 ? '9+' : String(c);
  d.style.display  = c > 0 ? 'flex' : 'none';
}

// All use string concatenation — zero template literals — safe in HTML attrs.

function sbadge(s) {
  var m = { ok:['b-ok','On-Time'], delay:['b-dl','Retrasado'],
            transit:['b-tr','En Transito'], pend:['b-pd','Pendiente'] };
  var v = m[s] || ['b-tr','?'];
  return '<span class="bdg '+v[0]+'">'+v[1]+'</span>';
}
function mbadge(m) {
  var c = { sea:['b-sea','ti-anchor','Mar'], land:['b-land','ti-truck','Tierra'], air:['b-air','ti-plane','Aire'] };
  var v = c[m] || ['b-tr','ti-box',m];
  return '<span class="bdg '+v[0]+'"><i class="ti '+v[1]+'"></i> '+v[2]+'</span>';
}
function rbadge(r) {
  var m = { executive:['b-exec','C-Level'], analyst:['b-ana','Analista'], client:['b-cli','Cliente'] };
  var v = m[r] || ['b-tr',r];
  return '<span class="bdg '+v[0]+'">'+v[1]+'</span>';
}

function modeTabs() {
  var tabs = [
    { id:'all',  ic:'ti-world',  lb:'Todos'     },
    { id:'sea',  ic:'ti-anchor', lb:'Maritimo'  },
    { id:'land', ic:'ti-truck',  lb:'Terrestre' },
    { id:'air',  ic:'ti-plane',  lb:'Aereo'     }
  ];
  var html = '<div class="mtabs" id="mode-tabs">';
  tabs.forEach(function(t) {
    html += '<button class="mtab'+(activeMode===t.id?' active':'')+'" data-mode="'+t.id+'">'
          + '<i class="ti '+t.ic+'"></i> '+t.lb+'</button>';
  });
  return html + '</div>';
}

function expBar() {
  return '<div class="exp-bar">'
    + '<span style="font-size:10px;color:var(--muted)"><i class="ti ti-download"></i> Exportar:</span>'
    + '<button class="exp-btn e-pdf" data-action="pdf"><i class="ti ti-file-type-pdf"></i> PDF</button>'
    + '<button class="exp-btn e-xl"  data-action="xl"><i class="ti ti-table"></i> Excel</button>'
    + '<button class="exp-btn e-csv" data-action="csv"><i class="ti ti-file-spreadsheet"></i> CSV</button>'
    + '</div>';
}

function kpiGrid(items) {
  var html = '<div class="kpi-grid">';
  items.forEach(function(i) {
    var delta = i.delta
      ? '<div class="kpi-delta '+(i.dt||'nt')+'">'
        +(i.dt==='up'?'&#8593;':i.dt==='dn'?'&#8595;':'&#8594;')
        +' '+i.delta+'</div>'
      : '';
    html += '<div class="kpi '+(i.cls||'c')+'">'
      + '<div class="kpi-lbl">'+i.lbl+'</div>'
      + '<div class="kpi-val">'+i.val+'</div>'
      + delta+'</div>';
  });
  return html+'</div>';
}

function alertRows(items) {
  var icons = { crit:'ti-alert-circle', warn:'ti-alert-triangle', ok:'ti-circle-check', info:'ti-info-circle' };
  return items.map(function(a) {
    return '<div class="alert-row a-'+a.lv+'">'
      +'<i class="ti '+(icons[a.lv]||'ti-bell')+'" style="font-size:14px;flex-shrink:0;margin-top:1px"></i>'
      +'<div><div class="a-t">'+a.title+'</div>'
      +'<div class="a-b">'+a.body+'</div>'
      +'<div class="a-tm">'+a.time+'</div></div></div>';
  }).join('');
}

function emptyState(icon, title, sub) {
  return '<div class="empty-state"><i class="ti '+icon+'"></i><p>'
    +title+(sub?'<br><span style="font-size:10px;opacity:.7">'+sub+'</span>':'')
    +'</p></div>';
}

// ── EXPORT ────────────────────────────────────────────────────────────────
function exportExcel() {
  if (typeof XLSX === 'undefined') { showToast('Libreria Excel cargando, intenta en 2s'); return; }
  var ships = filteredShips();
  var rows  = ships.map(function(s) {
    return { ID:s.id, Origen:s.orig, Destino:s.dest, Modo:s.mode,
             Estado:s.status, ETA:s.eta, CostoUSD:s.cost };
  });
  var ws = XLSX.utils.json_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Envios');
  XLSX.writeFile(wb, 'navicore-envios.xlsx');
  showToast('Excel descargado');
}

function exportCSV() {
  var ships   = filteredShips();
  var headers = ['ID','Origen','Destino','Modo','Estado','ETA','Costo USD'];
  var rows    = ships.map(function(s) {
    return [s.id, s.orig, s.dest, s.mode, s.status, s.eta, s.cost]
      .map(function(v) { return '"'+String(v).replace(/"/g,'""')+'"'; })
      .join(',');
  });
  var csv  = [headers.join(',')].concat(rows).join('\n');
  var blob = new Blob([csv], { type:'text/csv' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = 'navicore-envios.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV descargado');
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────
function toggleNotif() {
  notifOpen = !notifOpen;
  var panel = document.getElementById('notif-panel');
  if (!panel) return;
  if (notifOpen) { panel.classList.add('open'); renderNotifPanel(); }
  else           { panel.classList.remove('open'); }
}

function renderNotifPanel() {
  var lc = { crit:'var(--danger)', warn:'var(--warn)', ok:'var(--success)', info:'var(--cyan)' };
  var li = { crit:'ti-alert-circle', warn:'ti-alert-triangle', ok:'ti-circle-check', info:'ti-info-circle' };
  var nl = document.getElementById('notif-list');
  if (!nl) return;
  if (!ALERTS.length) {
    nl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted);font-size:11px">'
      + '<i class="ti ti-bell-off" style="font-size:24px;display:block;margin-bottom:8px;opacity:.3"></i>'
      + 'Sin notificaciones</div>';
    return;
  }
  var html = '';
  ALERTS.forEach(function(a) {
    var bg  = a.read ? '' : 'background:rgba(0,194,204,0.04);';
    var bc  = a.read ? '' : 'border-left-color:'+(lc[a.lv]||'var(--cyan)')+';';
    var nw  = a.read ? '' : '<span style="font-size:8px;background:var(--danger);color:#fff;padding:1px 5px;border-radius:3px;margin-left:6px">NUEVO</span>';
    html += '<div class="notif-item'+(a.read?'':' unread')+'" style="'+bg+bc+'" data-nid="'+a.id+'">'
      + '<div class="notif-t"><i class="ti '+(li[a.lv]||'ti-bell')+'" style="color:'+(lc[a.lv]||'var(--cyan)')+';margin-right:4px"></i>'
      + a.title+nw+'</div>'
      + '<div class="notif-b">'+a.body+'</div>'
      + '<div class="notif-tm">'+a.time+'</div></div>';
  });
  nl.innerHTML = html;
}

function readNotif(id) {
  var a = ALERTS.find(function(x) { return x.id === id; });
  if (a) a.read = true;
  updateNotifDot();
  renderNotifPanel();
}

function markAllRead() {
  ALERTS.forEach(function(a) { a.read = true; });
  updateNotifDot();
  renderNotifPanel();
  showToast('Todas marcadas como leidas');
}

function addLiveNotif() {
  var msgs = [
    { lv:'info', title:'Datos sincronizados', body:'Flota actualizada — '+SHIPS.length+' envios rastreados.' },
    { lv:'warn', title:'Puerto congestionado', body:'Demoras 4-6h reportadas. Revisa envios maritimos.' }
  ];
  var m = msgs[Math.floor(Math.random()*msgs.length)];
  ALERTS.unshift({ id:Date.now(), lv:m.lv, title:m.title, body:m.body, time:'Ahora mismo', read:false });
  updateNotifDot();
  showToast(m.title);
}

// ── AUTH ──────────────────────────────────────────────────────────────────
function doLogin() {
  var emailEl = document.getElementById('li-email');
  var passEl  = document.getElementById('li-pass');
  var errEl   = document.getElementById('li-err');
  var btnEl   = document.getElementById('btn-login');
  if (!emailEl || !passEl || !errEl) return;

  var email = emailEl.value.trim();
  var pass  = passEl.value;

  errEl.style.display = 'none';

  if (!email || !pass) {
    errEl.textContent   = 'Ingresa tu correo y contrasena.';
    errEl.style.display = 'block';
    return;
  }

  var u = USERS_REF[email];
  if (!u || u.pass !== pass) {
    errEl.textContent   = 'Credenciales incorrectas. Usa los accesos demo abajo.';
    errEl.style.display = 'block';
    return;
  }

  // Valid login
  if (btnEl) { btnEl.textContent = 'Cargando...'; btnEl.disabled = true; }

  role = u.role;
  var ls = document.getElementById('login-screen');
  if (ls) ls.style.display = 'none';

  document.getElementById('u-av').textContent   = u.init;
  document.getElementById('u-name').textContent = u.name;
  var roleLabels = { executive:'C-Level', analyst:'Analista', client:'Cliente' };
  document.getElementById('u-role').textContent = roleLabels[u.role] || u.role;

  buildNav(u.role);
  updateNotifDot();
  var firstPage = (NAV_MAP[u.role] || [])[0];
  if (firstPage) goTo(firstPage.id);
  setTimeout(addLiveNotif, 8000);
}

function quickLogin(email, pass) {
  var emailEl = document.getElementById('li-email');
  var passEl  = document.getElementById('li-pass');
  if (emailEl) emailEl.value = email;
  if (passEl)  passEl.value  = pass;
  doLogin();
}

function doLogout() {
  Object.keys(charts).forEach(function(k) {
    try { charts[k].destroy(); } catch(e) {}
  });
  charts     = {};
  role       = null;
  aiHistory  = [];
  notifOpen  = false;
  activeMode = 'all';

  var panel = document.getElementById('notif-panel');
  if (panel) panel.classList.remove('open');

  var ls = document.getElementById('login-screen');
  if (ls) ls.style.display = 'flex';

  var emailEl = document.getElementById('li-email');
  var passEl  = document.getElementById('li-pass');
  var btnEl   = document.getElementById('btn-login');
  var errEl   = document.getElementById('li-err');
  if (emailEl) emailEl.value      = '';
  if (passEl)  passEl.value       = '';
  if (btnEl)   { btnEl.textContent = 'Ingresar al Portal'; btnEl.disabled = false; }
  if (errEl)   errEl.style.display = 'none';
  document.title = 'NAVICORE — Logistics Intelligence Platform';
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function buildNav(r) {
  var items = NAV_MAP[r] || [];
  var html  = '<div class="sb-section">Menu</div>';
  items.forEach(function(n) {
    var dot = (n.id === 'admin') ? '<span class="nav-badge"></span>' : '';
    html += '<div class="nav-item" data-page="'+n.id+'">'
      +'<i class="ti '+n.ic+'"></i>'+n.lb+dot+'</div>';
  });
  var menu = document.getElementById('nav-menu');
  if (menu) menu.innerHTML = html;
}

function setMode(m) {
  activeMode = m;
  var active = document.querySelector('.nav-item.active');
  if (active) goTo(active.getAttribute('data-page'));
}

function goTo(pid) {
  // Update active nav item
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var navEl = document.querySelector('[data-page="'+pid+'"]');
  if (navEl) navEl.classList.add('active');

  // Destroy old charts
  Object.keys(charts).forEach(function(k) { try { charts[k].destroy(); } catch(e) {} });
  charts = {};

  var mc = document.getElementById('main');
  if (!mc) return;
  mc.scrollTop = 0;

  var pageKey = (pid === 'dashboard') ? 'dashboard-'+role : pid;
  var builders = {
    'dashboard-executive': buildExecDash,
    'dashboard-analyst':   buildAnalystDash,
    'tracking':    buildTrackPage,
    'financials':  buildFinancePage,
    'documents':   buildDocsPage,
    'compliance':  buildCompPage,
    'predictive':  buildPredPage,
    'reports':     buildReportsPage,
    'onboarding':  buildOnboardingPage,
    'admin':       buildAdminPage,
    'ai':          buildAIPage
  };

  var builder = builders[pageKey] || builders[pid];
  mc.innerHTML = builder
    ? builder()
    : '<div style="padding:40px;text-align:center;color:var(--muted)">Pagina no disponible</div>';

  document.title = 'NAVICORE — '+pid.charAt(0).toUpperCase()+pid.slice(1);
  setTimeout(function() { initCharts(pid); }, 80);
}

function buildTrackPage() {
  var allShips = role==='client' ? SHIPS.slice(0,3) : SHIPS;
  var ships    = activeMode==='all' ? allShips : allShips.filter(function(s){return s.mode===activeMode;});
  var steps    = {
    sea:  ['Origen','Aduana','Zarpe','Alta Mar','Puerto','Entrega'],
    air:  ['Origen','Check-in','Vuelo','Aduana','Destino'],
    land: ['Origen','Ruta','Revision','Destino']
  };
  var sColors  = { ok:'var(--success)', delay:'var(--danger)', transit:'var(--cyan)', pend:'var(--warn)' };

  var cards = ships.map(function(s) {
    var st   = steps[s.mode] || steps.land;
    var tot  = st.length - 1;
    var done = tot > 0 ? Math.floor(s.prog/100*tot) : 0;
    var pc   = sColors[s.status] || 'var(--cyan)';

    var timeline = st.map(function(step, i) {
      var dotBg  = i<done ? 'var(--success)' : (i===done ? 'var(--cyan)' : 'rgba(107,130,153,.2)');
      var lineBg = i<done ? 'var(--success)' : 'rgba(107,130,153,.1)';
      var txtCol = i<=done ? 'var(--muted)' : 'rgba(107,130,153,.3)';
      var line   = i<st.length-1
        ? '<div style="flex:1;height:1.5px;background:'+lineBg+'"></div>'
        : '';
      return '<div style="display:flex;flex-direction:column;align-items:center;flex:'+(i<st.length-1?'1':'0 0 auto')+'">'
        +'<div style="display:flex;align-items:center;width:100%">'
        +'<div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;background:'+dotBg+'"></div>'
        +line+'</div>'
        +'<span style="font-size:8px;margin-top:3px;white-space:nowrap;color:'+txtCol+'">'+step+'</span></div>';
    }).join('');

    return '<div class="track-card">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
      +'<div>'
      +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;letter-spacing:2px;color:var(--cyan)">'+s.id+'</div>'
      +'<div style="font-size:10px;color:var(--muted);margin-top:2px">'+s.orig+' &#8594; '+s.dest+'</div>'
      +'<div style="font-size:9.5px;color:var(--muted2);margin-top:2px">'+s.cargo+' &middot; '+s.client+'</div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'+sbadge(s.status)
      +'<div style="font-size:10px;color:var(--muted);margin-top:4px">ETA: <span style="color:var(--cyan)">'+s.eta+'</span></div>'
      +'<div style="margin-top:4px">'+mbadge(s.mode)+'</div></div>'
      +'</div>'
      +'<div style="height:2.5px;background:rgba(107,130,153,.12);border-radius:2px;margin:10px 0 5px;overflow:hidden">'
      +'<div style="height:100%;background:'+pc+';width:'+s.prog+'%;border-radius:2px;transition:width .4s"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-bottom:10px">'
      +'<span>'+s.prog+'% completado</span><span>$'+s.cost.toLocaleString()+'</span></div>'

function buildFinancePage() {
  var ships   = filteredShips();
  var revenue = ships.reduce(function(a,s){return a+s.cost;},0);
  var cost    = Math.round(revenue*0.68);
  var margin  = revenue>0 ? Math.round((revenue-cost)/revenue*1000)/10 : 0;
  var avg     = ships.length>0 ? Math.round(cost/ships.length) : 0;

  var showSea  = activeMode==='all'||activeMode==='sea';
  var showLand = activeMode==='all'||activeMode==='land';
  var showAir  = activeMode==='all'||activeMode==='air';

  var trows = ships.map(function(s) {
    var c = Math.round(s.cost*0.68);
    var m = s.cost>0 ? Math.round((s.cost-c)/s.cost*100) : 0;
    return '<tr>'
      +'<td><div style="font-family:monospace;font-size:10px;color:var(--cyan)">'+s.id+'</div>'
      +'<div style="font-size:9.5px;color:var(--muted)">'+s.orig+' &#8594; '+s.dest+'</div></td>'
      +'<td>'+mbadge(s.mode)+'</td>'
      +'<td>$'+s.cost.toLocaleString()+'</td>'
      +'<td>$'+c.toLocaleString()+'</td>'
      +'<td style="color:'+(m>=30?'var(--success)':'var(--warn)')+'">'+m+'%</td>'
      +'<td>'+sbadge(s.status)+'</td></tr>';
  }).join('');

  var clientBars = ships.slice(0,4).map(function(s) {
    var max = ships.reduce(function(a,x){return Math.max(a,x.cost);},1);
    var pct = Math.round(s.cost/max*100);
    return '<div class="mb-row">'
      +'<span class="mb-lbl" style="width:90px;font-size:9.5px">'+s.client.split(' ')[0]+'</span>'
      +'<div class="mb-track"><div class="mb-fill" style="width:'+pct+'%;background:var(--cyan)"></div></div>'
      +'<span class="mb-val">$'+Math.round(s.cost/1000)+'K</span></div>';
  }).join('');

  return '<div class="page-hdr"><div>'
    +'<div class="page-title">Costos y Rentabilidad</div>'
    +'<div class="page-sub">'+(activeMode==='all'?'Analisis financiero completo':'Solo '+MODE_LBL[activeMode])+' &middot; '+ships.length+' envios</div>'
    +'</div>'+modeTabs()+'</div>'
    +expBar()
    +kpiGrid([
      {lbl:'Revenue Total',   val:'$'+revenue.toLocaleString(), delta:'+8.5%', dt:'up', cls:'g'},
      {lbl:'Costo Operativo', val:'$'+cost.toLocaleString(),    delta:'+3.2%', dt:'up', cls:'c'},
      {lbl:'Margen Bruto',    val:margin+'%',                   delta:'+1.8pp', dt:'up', cls:'c'},
      {lbl:'Costo / Envio',   val:ships.length?'$'+avg.toLocaleString():'-', delta:ships.length+' envios', dt:'dn', cls:'w'}
    ])
    +'<div class="card"><div class="card-title"><i class="ti ti-chart-bar"></i>Revenue vs Costo &middot; 6 meses</div>'
    +'<div style="position:relative;height:155px"><canvas id="ch-fin"></canvas></div></div>'
    +'<div class="chart-grid">'
    +'<div class="card"><div class="card-title"><i class="ti ti-chart-donut"></i>Margen por modo</div>'
    +'<div style="margin-top:10px">'
    +(showAir  ? '<div class="mb-row"><span class="mb-lbl">Aereo</span><div class="mb-track"><div class="mb-fill" style="width:73%;background:var(--cyan)"></div></div><span class="mb-val" style="color:var(--cyan)">36.5%</span></div>' : '')
    +(showSea  ? '<div class="mb-row"><span class="mb-lbl">Maritimo</span><div class="mb-track"><div class="mb-fill" style="width:68%;background:var(--slate2)"></div></div><span class="mb-val" style="color:var(--slate2)">34.1%</span></div>' : '')
    +(showLand ? '<div class="mb-row"><span class="mb-lbl">Terrestre</span><div class="mb-track"><div class="mb-fill" style="width:46%;background:var(--success)"></div></div><span class="mb-val" style="color:var(--success)">23.0%</span></div>' : '')
    +'</div></div>'
    +'<div class="card"><div class="card-title"><i class="ti ti-users"></i>Top clientes &middot; Revenue</div>'
    +'<div style="margin-top:10px">'+(ships.length===0?'<div style="color:var(--muted);font-size:11px;text-align:center;padding:12px">Sin datos</div>':clientBars)+'</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title"><i class="ti ti-route"></i>Detalle financiero</div>'
    +(ships.length===0 ? emptyState('ti-coin','Sin envios '+MODE_LBL[activeMode])
      : '<table class="tbl"><thead><tr><th>ID / Ruta</th><th>Modo</th><th>Revenue</th><th>Costo Est.</th><th>Margen</th><th>Estado</th></tr></thead>'
        +'<tbody>'+trows+'</tbody></table>')
    +'</div>';
}

function buildCompPage() {
  var ci    = COMPLIANCE_DATA.length ? COMPLIANCE_DATA : [{area:'Aduana',status:'ok',note:'OK'}];
  var ok    = ci.filter(function(x){return x.status==='ok';}).length;
  var warn  = ci.filter(function(x){return x.status==='warn';}).length;
  var fail  = ci.filter(function(x){return x.status==='fail';}).length;
  var score = ci.length ? Math.round(ok/ci.length*100) : 100;

  var grid = ci.map(function(c) {
    var col = c.status==='ok'?'var(--success)':c.status==='warn'?'var(--warn)':'var(--danger)';
    var lbl = c.status==='ok'?'Conforme':c.status==='warn'?'Revisar':'Incidencia';
    return '<div class="comp-card">'
      +'<div style="display:flex;align-items:center;margin-bottom:3px">'
      +'<span class="comp-dot" style="background:'+col+'"></span>'
      +'<span style="font-size:11px;font-weight:500">'+c.area+'</span></div>'
      +'<div style="font-size:10.5px;color:'+col+'">'+lbl+'</div>'
      +'<div style="font-size:9.5px;color:var(--muted);margin-top:1px">'+c.note+'</div></div>';
  }).join('');

  return '<div class="page-hdr"><div>'
    +'<div class="page-title">Compliance y Regulatorio</div>'
    +'<div class="page-sub">Score global: '+score+'% &middot; '+ci.length+' areas</div>'
    +'</div></div>'
    +expBar()
    +kpiGrid([
      {lbl:'Score Global',  val:score+'%', delta:'+2pp', dt:'up', cls:'g'},
      {lbl:'Conformes',     val:ok,         delta:ok+' areas',  dt:'up', cls:'g'},
      {lbl:'Por Revisar',   val:warn,        delta:warn+' areas',dt:warn>0?'dn':'up', cls:'w'},
      {lbl:'Incidencias',   val:fail,        delta:fail>0?'Atencion':'OK', dt:fail>0?'dn':'up', cls:fail>0?'r':'g'}
    ])
    +'<div class="card"><div class="card-title"><i class="ti ti-shield"></i>Estado por area regulatoria</div>'
    +'<div class="comp-grid">'+grid+'</div></div>';
}

// ── AI SEND ───────────────────────────────────────────────────────────────
async function sendAI(preset) {
  var inp  = document.getElementById('ai-inp');
  var msgs = document.getElementById('ai-msgs');
  var btn  = document.getElementById('ai-btn');
  if (!msgs || !btn) return;

  var message = preset || (inp ? inp.value.trim() : '');
  if (!message || aiLoading) return;

  aiLoading = true;
  if (inp) inp.value = '';
  btn.disabled = true;

  aiHistory.push({ role:'user', content:message });

  var userDiv = document.createElement('div');
  userDiv.style.display = 'flex';
  userDiv.style.justifyContent = 'flex-end';
  userDiv.innerHTML = '<div class="ai-msg-user">'+message+'</div>';
  msgs.appendChild(userDiv);

  var loadDiv = document.createElement('div');
  loadDiv.id = 'ai-loading';
  loadDiv.style.cssText = 'display:flex;align-items:flex-start;gap:6px';
  loadDiv.innerHTML = '<div style="width:26px;height:26px;background:rgba(124,92,191,.2);border:1px solid rgba(124,92,191,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">&#129302;</div>'
    +'<div class="ai-msg-bot" style="color:var(--muted);font-size:10.5px">Analizando datos de flota<span class="ldots"></span></div>';
  msgs.appendChild(loadDiv);
  msgs.scrollTop = msgs.scrollHeight;

  var ctx = 'Flota: '+SHIPS.length+' envios. '
    +'Revenue: $'+SHIPS.reduce(function(a,s){return a+s.cost;},0).toLocaleString()+'. '
    +'Retrasados: '+SHIPS.filter(function(s){return s.status==='delay';}).length+'. '
    +'On-Time: '+SHIPS.filter(function(s){return s.status==='ok';}).length+'. '
    +'Alertas: '+ALERTS.filter(function(a){return !a.read;}).length+' sin leer. '
    +'Compliance: '+COMPLIANCE_DATA.filter(function(c){return c.status==='ok';}).length+'/'+COMPLIANCE_DATA.length+' conformes.';

  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:900,
        system:'Eres el asistente de inteligencia logistica de NAVICORE. Responde en espanol. Se preciso y accionable. Contexto: '+ctx,
        messages:aiHistory.slice(-8)
      })
    });
    var data  = await resp.json();
    var reply = (data.content && data.content[0] && data.content[0].text) || 'Sin respuesta.';
    aiHistory.push({ role:'assistant', content:reply });

    var ld = document.getElementById('ai-loading');
    if (ld) ld.remove();

    var botDiv = document.createElement('div');
    botDiv.style.cssText = 'display:flex;align-items:flex-start;gap:6px';
    botDiv.innerHTML = '<div style="width:26px;height:26px;background:rgba(124,92,191,.2);border:1px solid rgba(124,92,191,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px">&#129302;</div>'
      +'<div class="ai-msg-bot">'+reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'</div>';
    msgs.appendChild(botDiv);
  } catch(e) {
    var ld2 = document.getElementById('ai-loading');
    if (ld2) ld2.remove();
    var errDiv = document.createElement('div');
    errDiv.innerHTML = '<div class="ai-msg-bot" style="color:var(--warn)">&#9888; Sin conexion a internet o el servidor no responde.</div>';
    msgs.appendChild(errDiv);
  }

  aiLoading = false;
  btn.disabled = false;
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

    var c = document.getElementById('adm-c');
    if (c) c.innerHTML = admUsersHTML();
  });

  document.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;

    }

  console.log('[NAVICORE] Ready. Profile:', ACTIVE_PROFILE, '| Users:', Object.keys(USERS_REF).join(', '));
});

// Auto-map heuristic — match header keywords to app fields
var OBD_KEYWORDS = {
  id:     ['id','ref','referencia','folio','orden','shipment','hawb','mawb','bl','awb','cmr','numero'],
  orig:   ['orig','origen','origin','from','departure','salida','procedencia','pol'],
  dest:   ['dest','destino','destination','to','arrival','llegada','pod','consignee city'],
  mode:   ['mode','modo','tipo','type','transport','modalidad','via'],
  cargo:  ['cargo','carga','mercanc','descripcion','goods','product','commodity'],
  weight: ['peso','weight','kg','ton','volumen','cbm','gross'],
  cost:   ['costo','cost','flete','freight','valor','amount','usd','precio','rate'],
  eta:    ['eta','fecha','date','llegada','arrival','delivery','entrega','estimado'],
  client: ['cliente','client','shipper','consignee','empresa','company','customer'],
  status: ['estado','status','estatus','state'],
};

function autoMap(headers) {
  var mapping = {};
  headers.forEach(function(h) {
    var hl = h.toLowerCase().trim();
    Object.keys(OBD_KEYWORDS).forEach(function(field) {
      if (mapping[field]) return;  // already mapped
      OBD_KEYWORDS[field].forEach(function(kw) {
        if (hl.indexOf(kw) >= 0 && !mapping[field]) {
          mapping[field] = h;
        }
      });
    });
  });
  return mapping;
}

function normalizeMode(val) {
  if (!val) return 'sea';
  var v = String(val).toLowerCase().trim();
  if (v==='sea'||v==='mar'||v==='maritimo'||v==='ocean'||v==='maritime') return 'sea';
  if (v==='land'||v==='tierra'||v==='terrestre'||v==='road'||v==='truck'||v==='ground') return 'land';
  if (v==='air'||v==='aire'||v==='aereo'||v==='aero'||v==='avion'||v==='air freight') return 'air';
  return 'sea';
}

function normalizeStatus(val) {
  if (!val) return 'transit';
  var v = String(val).toLowerCase().trim();
  if (v==='ok'||v==='entregado'||v==='delivered'||v==='completo') return 'ok';
  if (v==='delay'||v==='retrasado'||v==='delayed'||v==='retraso') return 'delay';
  if (v==='pend'||v==='pendiente'||v==='pending'||v==='nuevo') return 'pend';
  return 'transit';
}

function applyMapping(rows, mapping) {
  return rows.map(function(row, i) {
    var get = function(field) {
      var col = mapping[field];
      return col ? (row[col] || '') : '';
    };
    var cost = parseFloat(String(get('cost')).replace(/[^0-9.]/g,'')) || 0;
    return {
      id:     get('id')     || ('IMP-' + String(i+1).padStart(4,'0')),
      orig:   get('orig')   || 'Origen no especificado',
      dest:   get('dest')   || 'Destino no especificado',
      mode:   normalizeMode(get('mode')),
      cargo:  get('cargo')  || 'Carga importada',
      weight: get('weight') || '',
      cost:   cost,
      eta:    get('eta')    || 'Por confirmar',
      client: get('client') || 'Cliente',
      status: normalizeStatus(get('status')),
      prog:   cost > 0 ? 50 : 30,
    };
  });
}

// ── RENDER STEPS ────────────────────────────────────────────────────────────

function buildOnboardingPage() {
  _obd.step = 1; _obd.raw = []; _obd.headers = []; _obd.mapping = {};
  _obd.preview = []; _obd.fileName = ''; _obd.totalRows = 0;
  return renderOnboarding();
}

function renderOnboarding() {
  var stepLabels = ['Subir archivo','Mapear columnas','Previsualizar','Importado'];
  var stepsHtml = stepLabels.map(function(lb, i) {
    var n = i+1;
    var active  = _obd.step === n;
    var done    = _obd.step > n;
    var dotBg   = done ? 'var(--success)' : active ? 'var(--cyan)' : 'rgba(107,130,153,.2)';
    var dotCol  = done||active ? (done?'#fff':'var(--navy)') : 'var(--muted)';
    var lbCol   = active ? 'var(--cyan)' : done ? 'var(--success)' : 'var(--muted)';
    var line    = n<4 ? '<div style="flex:1;height:1.5px;background:'+(done?'var(--success)':'rgba(107,130,153,.15)')+'"></div>' : '';
    return '<div style="display:flex;flex-direction:column;align-items:center;flex:'+(n<4?'1':'0 0 auto')+'">'
      +'<div style="display:flex;align-items:center;width:100%">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:'+dotBg+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+dotCol+';flex-shrink:0">'
      +(done?'<i class="ti ti-check"></i>':String(n))+'</div>'
      +line+'</div>'
      +'<span style="font-size:9px;margin-top:4px;white-space:nowrap;color:'+lbCol+'">'+lb+'</span></div>';
  }).join('');

  var bodyHtml;
  if      (_obd.step === 1) bodyHtml = renderStep1();
  else if (_obd.step === 2) bodyHtml = renderStep2();
  else if (_obd.step === 3) bodyHtml = renderStep3();
  else                      bodyHtml = renderStep4();

  return '<div class="page-hdr"><div>'
    +'<div class="page-title">Importar Datos</div>'
    +'<div class="page-sub">Sube tus envios desde Excel o CSV &middot; Se importan a tu cuenta en segundos</div>'
    +'</div></div>'
    +'<div class="card" style="margin-bottom:10px">'
    +'<div style="display:flex;align-items:flex-start;gap:0;padding:4px 0 8px">'+stepsHtml+'</div>'
    +'</div>'
    +'<div id="obd-body">'+bodyHtml+'</div>';
}

function renderStep1() {
  return '<div class="card">'
    // Drop zone
    +'<div id="obd-drop" style="border:2px dashed rgba(0,194,204,0.25);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(0,194,204,0.02)" '
    +'ondragover="event.preventDefault();this.style.borderColor=\'var(--cyan)\';this.style.background=\'rgba(0,194,204,0.06)\'" '
    +'ondragleave="this.style.borderColor=\'rgba(0,194,204,0.25)\';this.style.background=\'rgba(0,194,204,0.02)\'" '
    +'ondrop="obdHandleDrop(event)">'
    +'<i class="ti ti-upload" style="font-size:38px;color:var(--cyan);opacity:.6;display:block;margin-bottom:10px"></i>'
    +'<div style="font-size:14px;font-weight:600;color:var(--white);margin-bottom:5px">Arrastra tu archivo aqui</div>'
    +'<div style="font-size:11.5px;color:var(--muted);margin-bottom:16px">o haz click para seleccionar</div>'
    +'<button class="btn btn-primary" onclick="document.getElementById(\'obd-file-inp\').click()" style="font-size:12px;padding:8px 20px">'

    +'<div style="font-size:10px;color:var(--muted2);margin-top:12px">Formatos soportados: Excel (.xlsx, .xls) &middot; CSV con separador coma o punto y coma</div>'

    +'<i class="ti ti-bulb" style="color:var(--warn);font-size:16px;flex-shrink:0"></i>'
    +'<div style="font-size:10.5px;color:var(--muted)">'
    +'<strong style="color:var(--white2)">¿Primera vez?</strong> Descarga la plantilla de ejemplo, '
    +'rellena con tus datos y vuelve a subir.'
    +'</div>'
    +'<button class="btn btn-ghost btn-sm" onclick="obdDownloadTemplate()" style="flex-shrink:0;margin-left:auto">'

        +f.label+(f.req?' <span style="color:var(--danger);font-size:9px">*requerido</span>':'')+'</div>'
        +'<div style="font-size:9.5px;color:var(--muted)">'+f.hint+'</div></div>';
    }).join('')
    +'</div></div>';
}

function renderStep2() {
  var selStyle = 'background:var(--navy);border:1px solid rgba(107,130,153,.2);border-radius:6px;padding:5px 8px;color:var(--white);font-size:11px;font-family:\'DM Sans\',sans-serif;outline:none;width:100%';
  var rows = OBD_FIELDS.map(function(f) {
    var options = '<option value="">-- No mapear --</option>'
      + _obd.headers.map(function(h) {
          var sel = _obd.mapping[f.key] === h ? ' selected' : '';
          return '<option value="'+h.replace(/"/g,'&quot;')+'"'+sel+'>'+h+'</option>';
        }).join('');
    var mapped = _obd.mapping[f.key];
    var indicator = mapped
      ? '<span style="color:var(--success);font-size:11px"><i class="ti ti-circle-check"></i> '+mapped+'</span>'
      : (f.req ? '<span style="color:var(--warn);font-size:10px">Requerido</span>' : '<span style="color:var(--muted2);font-size:10px">Opcional</span>');
    return '<tr>'
      +'<td style="font-size:11px;padding:7px 9px;color:var(--white2)">'
      +f.label+(f.req?'<span style="color:var(--danger)">*</span>':'')+'</td>'
      +'<td style="padding:5px 9px">'
      +'<select style="'+selStyle+'" data-obdfield="'+f.key+'" onchange="obdMapChange(this)">'
      +options+'</select></td>'
      +'<td style="padding:7px 9px">'+indicator+'</td></tr>';
  }).join('');

  var mapped   = Object.keys(_obd.mapping).length;
  var reqMapped = OBD_FIELDS.filter(function(f){return f.req && _obd.mapping[f.key];}).length;
  var reqTotal  = OBD_FIELDS.filter(function(f){return f.req;}).length;
  var canNext   = reqMapped >= reqTotal;

  return '<div class="card">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">'
    +'<div>'
    +'<div style="font-size:13px;font-weight:600;color:var(--white)">Mapear columnas</div>'
    +'<div style="font-size:10.5px;color:var(--muted);margin-top:2px">Archivo: <span style="color:var(--cyan)">'+_obd.fileName+'</span> &middot; '+_obd.totalRows+' filas detectadas &middot; '+mapped+'/'+OBD_FIELDS.length+' columnas mapeadas</div>'
    +'</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="btn btn-ghost" onclick="obdBack()"><i class="ti ti-arrow-left"></i> Atras</button>'
    +'<button class="btn btn-primary" onclick="obdToPreview()" '+(canNext?'':'disabled style="opacity:.4"')+'>'
    +'Previsualizar <i class="ti ti-arrow-right"></i></button>'
    +'</div></div>'
    +(canNext?'':
      '<div style="padding:8px 12px;background:rgba(224,138,48,.08);border-radius:7px;border-left:2px solid var(--warn);font-size:10.5px;color:var(--warn);margin-bottom:10px">'
      +'Mapea al menos los campos requeridos (*) para continuar.</div>')
    +'<table class="tbl"><thead><tr><th>Campo NAVICORE</th><th>Columna de tu archivo</th><th>Estado</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'
    +'</div>';
}

function renderStep3() {
  var preview = _obd.preview;
  var modeLabel = { sea:'Maritimo', land:'Terrestre', air:'Aereo' };
  var modeColor = { sea:'var(--slate2)', land:'var(--success)', air:'var(--cyan)' };

  var trows = preview.map(function(s) {
    var mc = modeColor[s.mode] || 'var(--muted)';
    var ml = modeLabel[s.mode] || s.mode;
    return '<tr>'
      +'<td style="font-family:monospace;font-size:10px;color:var(--cyan)">'+s.id+'</td>'
      +'<td style="font-size:10px">'+s.orig+'</td>'
      +'<td style="font-size:10px">'+s.dest+'</td>'
      +'<td><span class="bdg" style="background:'+mc+'22;color:'+mc+'">'+ml+'</span></td>'
      +'<td style="font-size:10px">'+s.cargo+'</td>'
      +'<td style="font-size:10px">'+s.eta+'</td>'
      +'<td>'+sbadge(s.status)+'</td>'
      +'<td style="font-size:10px">'+( s.cost>0 ? '$'+s.cost.toLocaleString() : '—' )+'</td>'
      +'</tr>';
  }).join('');

  return '<div class="card">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">'
    +'<div>'
    +'<div style="font-size:13px;font-weight:600;color:var(--white)">Previsualizar importacion</div>'
    +'<div style="font-size:10.5px;color:var(--muted);margin-top:2px">Mostrando primeras '+preview.length+' filas de <strong style="color:var(--cyan)">'+_obd.totalRows+'</strong> envios a importar</div>'
    +'</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="btn btn-ghost" onclick="obdBack()"><i class="ti ti-arrow-left"></i> Atras</button>'
    +'<button class="btn btn-primary" onclick="obdDoImport()">'
    +'<i class="ti ti-database-import"></i> Importar '+_obd.totalRows+' envios</button>'
    +'</div></div>'
    +'<div style="background:rgba(46,201,126,.06);border:1px solid rgba(46,201,126,.2);border-radius:8px;padding:8px 12px;font-size:10.5px;color:var(--success);margin-bottom:10px">'
    +'<i class="ti ti-shield-check"></i> Estos envios se agregaran a tu cuenta. '
    +'Los datos existentes no se eliminaran. Puedes deshacer desde Admin.</div>'
    +'<div style="overflow-x:auto"><table class="tbl" style="min-width:700px"><thead><tr>'
    +'<th>ID</th><th>Origen</th><th>Destino</th><th>Modo</th><th>Carga</th><th>ETA</th><th>Estado</th><th>Costo</th>'
    +'</tr></thead><tbody>'+trows+'</tbody></table></div>'
    +'</div>';

function renderStep4() {
  var total = _obd.totalRows;
  var byMode = { sea:0, land:0, air:0 };
  _obd.preview.forEach(function(s) { if (byMode[s.mode]!==undefined) byMode[s.mode]++; });
  // Estimate from total
  var ratio = total > 0 ? total / Math.max(_obd.preview.length,1) : 1;
  Object.keys(byMode).forEach(function(k) { byMode[k] = Math.round(byMode[k]*ratio); });

  return '<div class="card" style="text-align:center;padding:40px 20px">'
    +'<div style="width:60px;height:60px;border-radius:50%;background:rgba(46,201,126,.15);border:2px solid var(--success);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;color:var(--success)">'
    +'<i class="ti ti-circle-check"></i></div>'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:26px;letter-spacing:2px;color:var(--white);margin-bottom:6px">'
    +total+' ENVIOS IMPORTADOS</div>'
    +'<div style="font-size:11.5px;color:var(--muted);margin-bottom:20px">'
    +'Desde: <span style="color:var(--cyan)">'+_obd.fileName+'</span></div>'
    +'<div style="display:flex;justify-content:center;gap:10px;margin-bottom:24px">'
    +['sea','land','air'].map(function(m) {
      var labels = {sea:'Maritimos',land:'Terrestres',air:'Aereos'};
      var colors = {sea:'var(--slate2)',land:'var(--success)',air:'var(--cyan)'};
      return '<div style="background:var(--navy3);border:1px solid rgba(107,130,153,.15);border-radius:9px;padding:10px 18px;text-align:center">'
        +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+colors[m]+'">'+byMode[m]+'</div>'
        +'<div style="font-size:9.5px;color:var(--muted)">'+labels[m]+'</div></div>';
    }).join('')
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:center">'
    +'<button class="btn btn-ghost" onclick="obdReset()">'
    +'<i class="ti ti-upload"></i> Importar otro archivo</button>'
    +'<button class="btn btn-primary" onclick="goTo(\'tracking\')">'
    +'<i class="ti ti-radar"></i> Ver en Trazabilidad</button>'
    +'</div>'
    +'</div>';
}

// ── HANDLERS ────────────────────────────────────────────────────────────────

function obdHandleDrop(e) {
  e.preventDefault();
  var file = e.dataTransfer.files[0];
  if (file) obdProcessFile(file);
}

function obdProcessFile(file) {
  _obd.fileName = file.name;
  var ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'csv') {
    var reader = new FileReader();
    reader.onload = function(e) {
      var text = e.target.result;
      // Detect separator
      var sep = text.indexOf(';') > text.indexOf(',') && text.indexOf(';') < 200 ? ';' : ',';
      var lines = text.trim().split('\n').filter(function(l) { return l.trim(); });
      if (lines.length < 2) { showToast('El archivo CSV parece estar vacio'); return; }
      var headers = lines[0].split(sep).map(function(h) { return h.replace(/^"|"$/g,'').trim(); });
      var rows = lines.slice(1).map(function(line) {
        var vals = line.split(sep).map(function(v) { return v.replace(/^"|"$/g,'').trim(); });
        var obj = {};
        headers.forEach(function(h, i) { obj[h] = vals[i] || ''; });
        return obj;
      });
      _obd.headers   = headers;
      _obd.raw       = rows;
      _obd.totalRows = rows.length;
      _obd.mapping   = autoMap(headers);
      _obd.step      = 2;
      document.getElementById('obd-body').innerHTML = renderStep2();
    };
    reader.readAsText(file, 'UTF-8');

  } else if (ext === 'xlsx' || ext === 'xls') {
    if (typeof XLSX === 'undefined') { showToast('Libreria Excel cargando, intenta en 2 segundos'); return; }
    var reader2 = new FileReader();
    reader2.onload = function(e) {
      try {
        var wb   = XLSX.read(e.target.result, { type:'binary' });
        var ws   = wb.Sheets[wb.SheetNames[0]];
        var data = XLSX.utils.sheet_to_json(ws, { defval:'' });
        if (!data.length) { showToast('La hoja Excel parece estar vacia'); return; }
        var headers = Object.keys(data[0]);
        _obd.headers   = headers;
        _obd.raw       = data;
        _obd.totalRows = data.length;
        _obd.mapping   = autoMap(headers);
        _obd.step      = 2;
        document.getElementById('obd-body').innerHTML = renderStep2();
      } catch(err) {
        showToast('Error leyendo Excel: ' + err.message);
      }
    };
    reader2.readAsBinaryString(file);
  } else {
    showToast('Formato no soportado. Usa .xlsx, .xls o .csv');
  }
}

function obdMapChange(sel) {
  var field  = sel.getAttribute('data-obdfield');
  var val    = sel.value;
  if (val) _obd.mapping[field] = val;
  else delete _obd.mapping[field];
  document.getElementById('obd-body').innerHTML = renderStep2();
}

function obdToPreview() {
  var reqFields = OBD_FIELDS.filter(function(f) { return f.req; });
  var allMapped = reqFields.every(function(f) { return _obd.mapping[f.key]; });
  if (!allMapped) { showToast('Mapea los campos requeridos primero'); return; }
  _obd.preview = applyMapping(_obd.raw.slice(0, 5), _obd.mapping);
  _obd.step = 3;
  document.getElementById('obd-body').innerHTML = renderStep3();
}

function obdDoImport() {
  var allMapped = applyMapping(_obd.raw, _obd.mapping);
  // Add to SHIPS array
  allMapped.forEach(function(s) { SHIPS.push(s); });
  _obd.step = 4;
  document.getElementById('obd-body').innerHTML = renderStep4();
  showToast(_obd.totalRows + ' envios importados correctamente');
  updateNotifDot();
}

function obdBack() {
  _obd.step = Math.max(1, _obd.step - 1);
  if (_obd.step === 1) {
    document.getElementById('obd-body').innerHTML = renderStep1();
  } else if (_obd.step === 2) {
    document.getElementById('obd-body').innerHTML = renderStep2();
  }
}

function obdReset() {
  _obd.step = 1; _obd.raw = []; _obd.headers = []; _obd.mapping = {};
  _obd.preview = []; _obd.fileName = ''; _obd.totalRows = 0;
  document.getElementById('obd-body').innerHTML = renderStep1();
}

function obdDownloadTemplate() {
  if (typeof XLSX === 'undefined') { showToast('Libreria Excel cargando, intenta en 2s'); return; }
  var template = [
    { 'ID / Referencia':'NCM-2847', 'Origen':'Cartagena, CO', 'Destino':'Rotterdam, NL',
      'Modo':'sea', 'Descripcion Carga':'Contenedores x24', 'Peso':'480 t',
      'Costo USD':45200, 'ETA':'15 Jun 2025', 'Cliente':'TransLog SA', 'Estado':'transit' },
    { 'ID / Referencia':'NCA-1193', 'Origen':'Bogota, CO', 'Destino':'Miami, FL',
      'Modo':'air', 'Descripcion Carga':'Carga express 800kg', 'Peso':'800 kg',
      'Costo USD':12800, 'ETA':'4 Jun 2025', 'Cliente':'AeroCargo PE', 'Estado':'ok' },
    { 'ID / Referencia':'NCT-5521', 'Origen':'Medellin, CO', 'Destino':'Buenaventura, CO',
      'Modo':'land', 'Descripcion Carga':'Carga general 20t', 'Peso':'20 t',
      'Costo USD':3400, 'ETA':'6 Jun 2025', 'Cliente':'LogiAndes CO', 'Estado':'delay' },
  ];
  var ws = XLSX.utils.json_to_sheet(template);
  // Set column widths
  ws['!cols'] = Object.keys(template[0]).map(function() { return { wch:18 }; });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Envios');
  XLSX.writeFile(wb, 'navicore-plantilla-importacion.xlsx');
  showToast('Plantilla descargada');
}
